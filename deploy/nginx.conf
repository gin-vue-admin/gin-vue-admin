# nginx 配置：托管前端 SPA + VitePress 文档站 + 反代后端 API + Swagger。
# /api/*    → server:8080          (后端 API)
# /docs/*   → 静态（VitePress 构建产物，cleanUrls=false 生成 .html）
# /swagger/* → server:8080          (Swagger UI，生产建议关闭或加网关鉴权)
# 其余      → 前端静态（history 模式回退 index.html）

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 安全响应头（生产另在边界网关加固 HSTS/CSP）
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # 后端 API 反代（server 是 compose 服务名）
    location /api/ {
        proxy_pass http://server:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger UI 反代（生产建议通过网关鉴权后暴露，或不暴露）
    location /swagger/ {
        proxy_pass http://server:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 文档站（VitePress）：cleanUrls=false，产物为 .html，直出静态无需 SPA fallback
    location /docs/ {
        try_files $uri $uri/ =404;
    }

    # 静态资源长缓存（带 hash 的 js/css）
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA history 模式：未知路径回退 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
