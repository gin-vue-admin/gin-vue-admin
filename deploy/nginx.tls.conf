# nginx TLS 配置（由 docker-compose.tls.yml 挂载替换 default.conf）。
# 证书路径与 certbot 默认输出对齐：/etc/letsencrypt/live/$DOMAIN/{fullchain,privkey}.pem
# DOMAIN 经 envsubst 在容器启动时注入（见 compose web.command 或 image 支持；此处用 $DOMAIN 占位需宿主预处理）。

server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME http-01 challenge（certbot webroot 模式）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其余 80 全部重定向到 443
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # 证书（首次签发前文件不存在，nginx 起不来 → 必须先跑 init-certs.sh）
    ssl_certificate     /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;

    # TLS 最佳实践（Mozilla intermediate）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS（仅在确定长期 HTTPS 后开启）
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # 后端 API 反代
    location /api/ {
        proxy_pass http://server:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger UI 反代（生产建议关闭或加网关鉴权）
    location /swagger/ {
        proxy_pass http://server:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 文档站（VitePress 静态）
    location /docs/ {
        try_files $uri $uri/ =404;
    }

    # 静态资源长缓存
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA history 回退
    location / {
        try_files $uri $uri/ /index.html;
    }
}
