# 全栈编排：mysql + server + web(nginx)。
# 用法：cd deploy && docker-compose up -d --build
# 访问：http://localhost (web) ；后端 API 经 web 反代 /api。
# 构建上下文为仓库根（server.Dockerfile/web.Dockerfile 引用 server/、web/）。
# 受限网络设 REGISTRY=docker.m.daocloud.io/library（见 .env）。

services:
  mysql:
    image: mysql:8.4
    container_name: gva-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gva}
      TZ: Asia/Shanghai
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT:-13306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 20

  server:
    build:
      context: ..
      dockerfile: deploy/server.Dockerfile
      args:
        REGISTRY: ${REGISTRY:-docker.io/library}
        GOPROXY: ${GOPROXY:-https://goproxy.cn}
    container_name: gva-server
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # GVA_ 前缀环境变量覆盖 config.yaml（M1 config.Load 支持）
      GVA_APP__MODE: release
      GVA_SERVER__PORT: "8080"
      GVA_DB__HOST: mysql
      GVA_DB__PORT: "3306"
      GVA_DB__USER: root
      GVA_DB__PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      GVA_DB__DBNAME: ${MYSQL_DATABASE:-gva}
      GVA_JWT__SECRET: ${JWT_SECRET:-change-me-in-production}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  web:
    build:
      context: ..
      dockerfile: deploy/web.Dockerfile
      args:
        REGISTRY: ${REGISTRY:-docker.io/library}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
        DOCS_BASE: ${DOCS_BASE:-/docs/}
    container_name: gva-web
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-80}:80"
    restart: unless-stopped

  # MySQL 每日备份：每天 BACKUP_INTERVAL（默认 24h）dump 到 deploy/data/backups/，保留 7 天。
  # 生产可用，开发用 `make compose-up` 默认启用；不需要时在 .env 设 ENABLE_BACKUP=false。
  db-backup:
    image: ${REGISTRY:-docker.io/library}/alpine:3.20
    container_name: gva-db-backup
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gva}
      BACKUP_INTERVAL: ${BACKUP_INTERVAL:-24h}
      KEEP_DAYS: ${KEEP_DAYS:-7}
    volumes:
      - ./data/backups:/backups
      - ./deploy/scripts/backup.sh:/backup.sh:ro
    entrypoint: ["/bin/sh", "/backup.sh"]
    restart: unless-stopped
    profiles: ["backup"]   # 仅 `docker compose --profile backup up` 时启用，默认不跑

volumes:
  mysql-data:
