# Dependabot — 依赖自动更新
# 每周一各生态检查新版本，自动开 PR。
# 配置参考：https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2

updates:
  # 后端 Go 依赖（server/go.mod）
  - package-ecosystem: gomod
    directory: /server
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(deps)
      include: scope
    labels: [dependencies, go]

  # 前端 npm 依赖（web/package.json）
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(deps)
      include: scope
    labels: [dependencies, frontend]
    # 前端锁定在特定 Node/pnpm 版本，minor/patch 优先
    groups:
      vue-ecosystem:
        patterns: ["vue", "@vue/*", "vue-router", "pinia"]
      build-tooling:
        patterns: ["vite", "@vitejs/*", "vite-plugin-*", "unplugin-*"]

  # 文档站 npm 依赖（根 package.json，VitePress）
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore(deps)
      include: scope
    labels: [dependencies, docs]
    groups:
      vitepress:
        patterns: ["vitepress", "@vitejs/*"]

  # GitHub Actions 版本
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci(deps)
      include: scope
    labels: [dependencies, ci]
