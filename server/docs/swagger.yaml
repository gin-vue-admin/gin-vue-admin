      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gva_internal_pkg_response.ApiResult'
      security:
      - BearerAuth: []
      summary: 字典详情
      tags:
      - dict
    put:
      consumes:
      - application/json
      parameters:
      - description: ID
        in: path
        name: id
        required: true
        type: integer
      - description: 字典信息
        in: body
