      - description: 名称/编码关键词
        in: query
        name: keyword
        type: string
      - description: 分类 ID
        in: query
        name: categoryId
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gva_internal_pkg_response.ApiResult'
      security:
      - BearerAuth: []
      summary: 字典分页列表
      tags:
