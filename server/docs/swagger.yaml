      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gva_internal_pkg_response.ApiResult'
      security:
      - BearerAuth: []
      summary: 更新字典分类
      tags:
      - dict-category
  /dict/categories/export:
    get:
      produces:
      - application/json
      responses:
