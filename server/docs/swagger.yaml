  /dict/items:
    delete:
      consumes:
      - application/json
      parameters:
      - description: ID 列表
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.dictBatchDeleteReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gva_internal_pkg_response.ApiResult'
      security:
      - BearerAuth: []
      summary: 批量删除字典项
      tags:
      - dict-item
    get:
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页
        in: query
        name: size
        type: integer
      - description: 名称/编码关键词
        in: query
        name: keyword
        type: string
      - description: 字典 ID
        in: query
        name: dictId
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gva_internal_pkg_response.ApiResult'
      security:
      - BearerAuth: []
      summary: 字典项分页列表
      tags:
      - dict-item
    post:
      consumes:
      - application/json
      parameters:
      - description: 字典项信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/gva_internal_service.DictItemUpsertReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gva_internal_pkg_response.ApiResult'
      security:
      - BearerAuth: []
      summary: 创建字典项
